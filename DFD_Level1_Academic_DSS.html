<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Level 1 DFD – Academic Decision Support System</title>
<style>
  body { margin: 0; background: #f5f6fa; font-family: Arial, sans-serif; }
  svg { display: block; margin: 0 auto; background: #fff; }

  /* External Entity */
  .entity rect { fill: #1a1a2e; stroke: #1a1a2e; stroke-width: 2; }
  .entity text { fill: #fff; font-weight: bold; font-size: 13px; }

  /* Process circles */
  .process ellipse { stroke-width: 2; }
  .process text { font-size: 11px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }

  /* Data stores */
  .store line { stroke-width: 2; }
  .store text { font-size: 11px; font-weight: bold; }

  /* Arrows */
  .flow { fill: none; stroke-width: 1.6; marker-end: url(#arrow); }
  .flow-label { font-size: 9.5px; fill: #333; font-style: italic; }

  /* Legend */
  .legend rect { stroke-width: 1.5; }
  .legend text { font-size: 11px; fill: #333; }
</style>
</head>
<body>
<svg width="1200" height="860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ─── Title ─── -->
  <rect x="0" y="0" width="1200" height="50" fill="#1a1a2e"/>
  <text x="600" y="31" text-anchor="middle" fill="white" font-size="18" font-weight="bold" font-family="Arial">
    Level 1 Data Flow Diagram — Academic Decision Support System (Academic DSS)
  </text>

  <!-- ══════════════════════════════════════════════
       EXTERNAL ENTITY: Student
  ══════════════════════════════════════════════ -->
  <g class="entity" transform="translate(30, 390)">
    <rect x="0" y="-30" width="100" height="60" rx="4"/>
    <text x="50" y="-6" text-anchor="middle">Student</text>
    <text x="50" y="10" text-anchor="middle" font-size="11" fill="#ccc">(User)</text>
  </g>

  <!-- ══════════════════════════════════════════════
       DATA STORES
  ══════════════════════════════════════════════ -->

  <!-- D1: Student Records -->
  <g class="store" transform="translate(480, 790)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#1d4ed8" />
    <line x1="0" y1="32" x2="200" y2="32" stroke="#1d4ed8"/>
    <rect x="0" y="0" width="30" height="32" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <rect x="30" y="0" width="170" height="32" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="15" y="20" text-anchor="middle" fill="#1d4ed8" font-weight="bold" font-size="12">D1</text>
    <text x="115" y="13" text-anchor="middle" fill="#1e3a8a" font-size="11" font-weight="bold">Student Records</text>
    <text x="115" y="26" text-anchor="middle" fill="#3b82f6" font-size="9.5">(students table — SQLite)</text>
  </g>

  <!-- D2: Prediction Records -->
  <g class="store" transform="translate(480, 730)">
    <rect x="0" y="0" width="30" height="32" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <rect x="30" y="0" width="170" height="32" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="15" y="20" text-anchor="middle" fill="#16a34a" font-weight="bold" font-size="12">D2</text>
    <text x="115" y="13" text-anchor="middle" fill="#14532d" font-size="11" font-weight="bold">Prediction Records</text>
    <text x="115" y="26" text-anchor="middle" fill="#22c55e" font-size="9.5">(predictions table — SQLite)</text>
  </g>

  <!-- ══════════════════════════════════════════════
       PROCESSES  (7 sub-processes)
  ══════════════════════════════════════════════ -->

  <!-- P1: User Authentication -->
  <g class="process" transform="translate(290, 130)">
    <ellipse cx="0" cy="0" rx="78" ry="45" fill="#e0e7ff" stroke="#4338ca" stroke-width="2"/>
    <text x="0" y="-8" fill="#312e81" font-size="10" font-weight="bold">1.0</text>
    <text x="0" y="5" fill="#312e81" font-size="10" font-weight="bold">User</text>
    <text x="0" y="18" fill="#312e81" font-size="10" font-weight="bold">Authentication</text>
  </g>

  <!-- P2: Predictive Analytics -->
  <g class="process" transform="translate(520, 250)">
    <ellipse cx="0" cy="0" rx="78" ry="45" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="0" y="-8" fill="#78350f" font-size="10" font-weight="bold">2.0</text>
    <text x="0" y="5" fill="#78350f" font-size="10" font-weight="bold">Predictive</text>
    <text x="0" y="18" fill="#78350f" font-size="10" font-weight="bold">Analytics</text>
  </g>

  <!-- P3: Prescriptive Analytics -->
  <g class="process" transform="translate(780, 200)">
    <ellipse cx="0" cy="0" rx="78" ry="45" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
    <text x="0" y="-8" fill="#831843" font-size="10" font-weight="bold">3.0</text>
    <text x="0" y="5" fill="#831843" font-size="10" font-weight="bold">Prescriptive</text>
    <text x="0" y="18" fill="#831843" font-size="10" font-weight="bold">Analytics</text>
  </g>

  <!-- P4: Scenario Forecasting -->
  <g class="process" transform="translate(1000, 370)">
    <ellipse cx="0" cy="0" rx="78" ry="45" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="0" y="-8" fill="#064e3b" font-size="10" font-weight="bold">4.0</text>
    <text x="0" y="5" fill="#064e3b" font-size="10" font-weight="bold">Scenario</text>
    <text x="0" y="18" fill="#064e3b" font-size="10" font-weight="bold">Forecasting</text>
  </g>

  <!-- P5: Memory Curve -->
  <g class="process" transform="translate(780, 530)">
    <ellipse cx="0" cy="0" rx="78" ry="45" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="0" y="-8" fill="#4c1d95" font-size="10" font-weight="bold">5.0</text>
    <text x="0" y="5" fill="#4c1d95" font-size="10" font-weight="bold">Memory Curve</text>
    <text x="0" y="18" fill="#4c1d95" font-size="10" font-weight="bold">Analysis</text>
  </g>

  <!-- P6: AI Chatbot -->
  <g class="process" transform="translate(520, 530)">
    <ellipse cx="0" cy="0" rx="78" ry="45" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="0" y="-8" fill="#7f1d1d" font-size="10" font-weight="bold">6.0</text>
    <text x="0" y="5" fill="#7f1d1d" font-size="10" font-weight="bold">AI Chatbot</text>
    <text x="0" y="18" fill="#7f1d1d" font-size="10" font-weight="bold">Interaction</text>
  </g>

  <!-- P7: History Management -->
  <g class="process" transform="translate(290, 600)">
    <ellipse cx="0" cy="0" rx="78" ry="45" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="0" y="-8" fill="#0c4a6e" font-size="10" font-weight="bold">7.0</text>
    <text x="0" y="5" fill="#0c4a6e" font-size="10" font-weight="bold">Prediction</text>
    <text x="0" y="18" fill="#0c4a6e" font-size="10" font-weight="bold">History</text>
  </g>


  <!-- ══════════════════════════════════════════════
       DATA FLOWS
  ══════════════════════════════════════════════ -->

  <!-- Student → P1: Registration / Login credentials -->
  <path class="flow" d="M130,375 C200,280 220,200 212,150" stroke="#4338ca" marker-end="url(#arrow-purple)"/>
  <text class="flow-label" x="148" y="270" fill="#4338ca">Registration /</text>
  <text class="flow-label" x="148" y="282" fill="#4338ca">Login credentials</text>

  <!-- P1 → Student: Auth token + Profile -->
  <path class="flow" d="M220,155 C180,220 150,310 130,405" stroke="#4338ca" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text class="flow-label" x="152" y="340" fill="#4338ca">Auth token /</text>
  <text class="flow-label" x="152" y="352" fill="#4338ca">Profile data</text>

  <!-- P1 → D1: Write student record -->
  <path class="flow" d="M290,175 L400,760 L480,800" stroke="#1d4ed8" marker-end="url(#arrow-blue)"/>
  <text class="flow-label" x="320" y="560" fill="#1d4ed8">Store student</text>
  <text class="flow-label" x="320" y="572" fill="#1d4ed8">record</text>

  <!-- D1 → P1: Read credentials for login -->
  <path class="flow" d="M484,795 L380,750 L310,172" stroke="#1d4ed8" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>

  <!-- Student → P2: Input parameters -->
  <path class="flow" d="M130,390 L442,265" stroke="#d97706" marker-end="url(#arrow-orange)"/>
  <text class="flow-label" x="220" y="308" fill="#d97706">Study hrs, Attendance,</text>
  <text class="flow-label" x="220" y="320" fill="#d97706">Sleep hrs, Revision freq</text>

  <!-- P2 → Student: Predicted marks + Grade + Breakdown -->
  <path class="flow" d="M450,268 L130,398" stroke="#d97706" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text class="flow-label" x="235" y="348" fill="#d97706">Predicted marks,</text>
  <text class="flow-label" x="235" y="360" fill="#d97706">Grade, Breakdown</text>

  <!-- P2 → D2: Store prediction -->
  <path class="flow" d="M520,295 L555,730" stroke="#16a34a" marker-end="url(#arrow-green)"/>
  <text class="flow-label" x="535" y="560" fill="#16a34a">Store prediction</text>

  <!-- Student → P3: Target marks -->
  <path class="flow" d="M130,375 C300,220 580,190 702,198" stroke="#be185d" marker-end="url(#arrow)"/>
  <text class="flow-label" x="370" y="186" fill="#be185d">Target marks</text>

  <!-- P3 → Student: Recommendations -->
  <path class="flow" d="M707,210 C580,230 300,240 130,403" stroke="#be185d" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text class="flow-label" x="380" y="245" fill="#be185d">Recommendations</text>

  <!-- P1 → P2: Auth token (valid session) -->
  <path class="flow" d="M360,145 L448,228" stroke="#888" marker-end="url(#arrow)"/>
  <text class="flow-label" x="378" y="185" fill="#555">Valid session</text>

  <!-- P1 → P3: Auth token -->
  <path class="flow" d="M368,130 C510,100 640,130 702,170" stroke="#888" marker-end="url(#arrow)"/>

  <!-- Student → P4: Scenario request -->
  <path class="flow" d="M130,382 C400,300 750,340 922,368" stroke="#059669" marker-end="url(#arrow-green)"/>
  <text class="flow-label" x="490" y="325" fill="#059669">Scenario request</text>

  <!-- P4 → Student: 3-scenario results -->
  <path class="flow" d="M924,380 C750,400 400,420 130,415" stroke="#059669" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text class="flow-label" x="490" y="415" fill="#059669">High / Medium / Low marks</text>

  <!-- Student → P5: Revision frequency -->
  <path class="flow" d="M130,410 C300,480 580,510 702,528" stroke="#7c3aed" marker-end="url(#arrow-purple)"/>
  <text class="flow-label" x="350" y="490" fill="#7c3aed">Revision frequency</text>

  <!-- P5 → Student: Memory curve + revision days -->
  <path class="flow" d="M706,542 C580,560 300,540 130,422" stroke="#7c3aed" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text class="flow-label" x="350" y="560" fill="#7c3aed">Retention curve data, Revision days</text>

  <!-- Student → P6: Chat message -->
  <path class="flow" d="M130,420 L442,530" stroke="#dc2626" marker-end="url(#arrow)"/>
  <text class="flow-label" x="200" y="490" fill="#dc2626">Chat message</text>

  <!-- P6 → Student: AI reply -->
  <path class="flow" d="M446,542 L130,432" stroke="#dc2626" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text class="flow-label" x="208" y="515" fill="#dc2626">AI response</text>

  <!-- D1 → P6: Student name (for personalised replies) -->
  <path class="flow" d="M492,792 L530,575" stroke="#1d4ed8" stroke-dasharray="3,3" marker-end="url(#arrow-blue)"/>
  <text class="flow-label" x="504" y="700" fill="#1d4ed8">Student name</text>

  <!-- Student → P7: History request -->
  <path class="flow" d="M130,418 C170,500 210,560 212,600" stroke="#0284c7" marker-end="url(#arrow-blue)"/>
  <text class="flow-label" x="135" y="512" fill="#0284c7">History</text>
  <text class="flow-label" x="135" y="524" fill="#0284c7">request</text>

  <!-- D2 → P7: Prediction records -->
  <path class="flow" d="M492,746 L370,618" stroke="#16a34a" marker-end="url(#arrow-green)"/>
  <text class="flow-label" x="408" y="698" fill="#16a34a">Past predictions</text>

  <!-- P7 → Student: History data -->
  <path class="flow" d="M212,612 C170,620 150,560 130,428" stroke="#0284c7" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text class="flow-label" x="108" y="568" fill="#0284c7">History</text>
  <text class="flow-label" x="108" y="580" fill="#0284c7">data</text>

  <!-- P2 → D1: Read student ID for auth check -->
  <path class="flow" d="M510,285 C500,500 500,700 500,793" stroke="#888" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- P4 → P4 internal: uses same regression model as P2 (label near P4) -->

  <!-- ══════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════ -->
  <g transform="translate(30, 700)">
    <rect x="0" y="0" width="200" height="115" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="100" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Legend</text>

    <!-- Entity -->
    <rect x="12" y="30" width="28" height="16" fill="#1a1a2e" rx="2"/>
    <text x="48" y="42" font-size="10" fill="#334155">External Entity (Student)</text>

    <!-- Process -->
    <ellipse cx="26" cy="62" rx="16" ry="10" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5"/>
    <text x="48" y="66" font-size="10" fill="#334155">Process</text>

    <!-- Data Store -->
    <rect x="10" y="78" width="8" height="14" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <rect x="18" y="78" width="24" height="14" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="48" y="89" font-size="10" fill="#334155">Data Store (SQLite)</text>

    <!-- Solid arrow = input flow -->
    <line x1="12" y1="106" x2="38" y2="106" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="48" y="110" font-size="10" fill="#334155">Input / Output Data Flow</text>
  </g>

  <!-- ══════════════════════════════════════════════
       PROCESS KEY BOX
  ══════════════════════════════════════════════ -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="175" height="180" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="87" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Process Key</text>
    <text x="10" y="36" font-size="10" fill="#312e81">1.0  User Authentication</text>
    <text x="10" y="52" font-size="10" fill="#78350f">2.0  Predictive Analytics</text>
    <text x="10" y="68" font-size="10" fill="#831843">3.0  Prescriptive Analytics</text>
    <text x="10" y="84" font-size="10" fill="#064e3b">4.0  Scenario Forecasting</text>
    <text x="10" y="100" font-size="10" fill="#4c1d95">5.0  Memory Curve Analysis</text>
    <text x="10" y="116" font-size="10" fill="#7f1d1d">6.0  AI Chatbot Interaction</text>
    <text x="10" y="132" font-size="10" fill="#0c4a6e">7.0  Prediction History</text>
    <line x1="10" y1="144" x2="165" y2="144" stroke="#e2e8f0"/>
    <text x="10" y="158" font-size="9.5" fill="#1d4ed8">D1  Student Records (SQLite)</text>
    <text x="10" y="172" font-size="9.5" fill="#16a34a">D2  Prediction Records (SQLite)</text>
  </g>

</svg>
</body>
</html>
